<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--Topic:inline vs block.div element.span element.Hr tag.sup @ sub tag.-->
       
      <!--block elements:takes up the full-width available(Whole block)start from new line-->

      <!--Inline:takes up only necessary width,don't start from new line-->

    <!--Div: Div is a container used to hold other HTML elementsor group elements together. It is a block line elements-->
      <div>
        <h1>Hello</h1>
        <h1>Everyone</h1>
      </div>
      <hr>

    <!--Span Element-->
       <!--Span is a generic container used to hold other HTML elements or group elements together it is an inline element-->
         <span>
            <h1>hello</h1>
            <h1>Everyone</h1>
        </span>
        <hr>
    <!--Hr tag: Horizontal rule element-->

    <!--sub @ sup tag:like hole squere is superscript-->
      <h4>(a+b)<sup>2</sup></h4>
      <h4>H<sub>2</sub>O</h4>

    <!--Semantic Markup: it is the markup that relates to the meaning of content-->
       <!--semantic tag:1:header.2:main.3:footer.4:nav.5:article.6:section.7:aside-->
</body>
</html>

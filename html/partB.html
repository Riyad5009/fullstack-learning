<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <!--Topic:List,attributes,anchor,image,and more tags--> 
       <!--List: 2type of list.1/order list.2/unorderlist-->
         <!--Unorder list: <ul></ul> and list tag is <li></li>-->
           <h4>This is unorder list</h4>
         <ul>
            <li>Bread</li>
            <li>Butter</li>
            <li>Jam</li>
           </ul>

    <!--Order list.tag:<ol></ol> and we can change type: type=""-->
      <h4>This is order list</h4>  
    <ol type="a">
            <li>Riayd</li>
            <li>Tamim</li>
            <li>Shakil</li>
        </ol>
    <!--Attributes are used to add more information to the tag.-->
        
    <!--Anchor element ussed to add link-->
       <!--anchor tag is:<a></a>-->
       <h4>This is anchor tag</h4>
          <a href="www.youtube.com">Go to youtube</a>
          <br>

     <!--Image element,used to add image to your page-->
        <!--Image tag:<img src="" alt=""-->
           <h4>Image tag</h4>
           <img src="./images.png" alt="Loding feild" height="100px">
    
    <!--practice-->
       <h1>List of Fruits</h1>
        <ul>
            <li>Apple <a href="">see an apple</a></li>
            <li>Orange <a href="">See an orange</a></li>
            <li>Mango <a href="">See a mango</a></li>
        </ul>     
</body>
</html>

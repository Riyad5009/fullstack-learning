<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="black">
        <caption>Student information</caption>
          <thead>
              <tr>
                <th rowspan="6">Info</th>
                <th rowspan="2">Name</th>
                <th colspan="2">Address</th>
              </tr>
              <tr>
                <th>City</th>
                <th>House</th>
              </tr>
          </thead>
          <tbody>
               <tr>
                  <td></td>
                  <td>A</td>
                  <td>Delhi</td>
                  <td>1</td>
               </tr>
               <tr>
                  <td></td>
                  <td>B</td>
                  <td>Mumbai</td>
                  <td>2</td>
               </tr>
               <tr>
                <td></td>
                <td>C</td>
                <td>Kolkata</td>
                <td>3</td>
               </tr>
               <tr>
                <td></td>
                <td>D</td>
                <td>Pune</td>
                <td>Pune</td>
               </tr>
          </tbody>
    </table>

    <br>
    <hr>
    <form action="/action">
        <div>
            <label for="name">Name</label>
            <input type="text" name="name">
        </div>
        <div>
            Sex:
            <input type="radio" name="m" id="gender">Male
            <input type="radio" name="f" id="gender">Female
        </div>
        <div>
            Country:
            <select name="country" id="country">
                <option value="Bangladesh">Bangladesh</option>
                <option value="India">India</option>
            </select>
        </div>
        <div>
            <div>Message:</div>
            <div>
                <textarea name="" id=""></textarea>
            </div>

        </div>
        <div>
            <input type="checkbox">Subscribe?
        </div>
        <button>Submit</button>
    </form>
</body>
</html>
